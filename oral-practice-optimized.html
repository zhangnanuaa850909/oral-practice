<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🌟 每日英语口语打卡 · 美音特训营</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');

:root {
  --bg: #0f0f1a;
  --card: #1a1a2e;
  --card-hover: #1e1e35;
  --accent: #f7b733;
  --accent2: #fc5c7d;
  --accent3: #6a82fb;
  --green: #00e676;
  --red: #ff5252;
  --text: #e8e8f0;
  --text-dim: #8888aa;
  --border: #2a2a45;
  --glass: rgba(255,255,255,0.04);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Nunito', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* Animated background */
body::before {
  content: '';
  position: fixed;
  top: -50%; left: -50%;
  width: 200%; height: 200%;
  background: radial-gradient(ellipse at 20% 50%, rgba(106,130,251,0.08) 0%, transparent 50%),
              radial-gradient(ellipse at 80% 20%, rgba(247,183,51,0.06) 0%, transparent 50%),
              radial-gradient(ellipse at 50% 80%, rgba(252,92,125,0.05) 0%, transparent 50%);
  animation: bgFloat 20s ease-in-out infinite;
  z-index: -1;
}

@keyframes bgFloat {
  0%, 100% { transform: translate(0, 0); }
  33% { transform: translate(-2%, 1%); }
  66% { transform: translate(1%, -2%); }
}

/* ========== NAVIGATION ========== */
.nav {
  position: fixed; top: 0; left: 0; right: 0;
  background: rgba(15,15,26,0.92);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  z-index: 100;
  padding: 0 16px;
}

.nav-inner {
  max-width: 800px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 56px;
}

.nav-title {
  font-size: 16px;
  font-weight: 800;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.nav-tabs {
  display: flex; gap: 4px;
}

.nav-tab {
  padding: 6px 14px;
  border-radius: 20px;
  border: none;
  background: transparent;
  color: var(--text-dim);
  font-family: inherit;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s;
}

.nav-tab.active {
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: #fff;
}

.nav-tab:hover:not(.active) {
  color: var(--text);
  background: var(--glass);
}

/* ========== MAIN ========== */
.main {
  max-width: 800px;
  margin: 0 auto;
  padding: 72px 16px 100px;
}

/* ========== HOME PAGE ========== */
.streak-banner {
  background: linear-gradient(135deg, rgba(247,183,51,0.15), rgba(252,92,125,0.1));
  border: 1px solid rgba(247,183,51,0.2);
  border-radius: 20px;
  padding: 24px;
  text-align: center;
  margin-bottom: 24px;
  position: relative;
  overflow: hidden;
}

.streak-banner::after {
  content: '';
  position: absolute;
  top: -50%; left: -50%;
  width: 200%; height: 200%;
  background: radial-gradient(circle, rgba(247,183,51,0.1) 0%, transparent 70%);
  animation: pulse 3s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { transform: scale(1); opacity: 0.5; }
  50% { transform: scale(1.1); opacity: 1; }
}

.streak-fire { font-size: 48px; position: relative; z-index: 1; }
.streak-count {
  font-size: 42px;
  font-weight: 900;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  position: relative; z-index: 1;
}
.streak-label {
  font-size: 14px;
  color: var(--text-dim);
  position: relative; z-index: 1;
  margin-top: 4px;
}

/* Stats row */
.stats-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  margin-bottom: 24px;
}

.stat-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 16px;
  text-align: center;
}

.stat-value {
  font-size: 28px;
  font-weight: 900;
  color: var(--accent3);
}

.stat-label {
  font-size: 11px;
  color: var(--text-dim);
  margin-top: 4px;
  text-transform: uppercase;
  letter-spacing: 1px;
}

/* Calendar */
.calendar-title {
  font-size: 14px;
  font-weight: 700;
  color: var(--text-dim);
  margin-bottom: 12px;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.calendar-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 6px;
  margin-bottom: 24px;
}

.cal-day {
  aspect-ratio: 1;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 700;
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--text-dim);
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
}

.cal-day.done {
  background: linear-gradient(135deg, rgba(0,230,118,0.2), rgba(0,230,118,0.05));
  border-color: rgba(0,230,118,0.3);
  color: var(--green);
}

.cal-day.today {
  border-color: var(--accent);
  box-shadow: 0 0 12px rgba(247,183,51,0.3);
}

.cal-day:hover {
  transform: scale(1.1);
}

/* Day list */
.day-list { display: flex; flex-direction: column; gap: 8px; }

.day-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 16px 18px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  cursor: pointer;
  transition: all 0.3s;
}

.day-card:hover {
  background: var(--card-hover);
  border-color: var(--accent3);
  transform: translateX(4px);
}

.day-card.completed {
  border-color: rgba(0,230,118,0.3);
}

.day-info { flex: 1; }

.day-num {
  font-size: 13px;
  font-weight: 800;
  color: var(--accent3);
  margin-bottom: 2px;
}

.day-topic {
  font-size: 15px;
  font-weight: 700;
}

.day-progress {
  width: 44px; height: 44px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 800;
  position: relative;
}

.day-progress svg {
  position: absolute;
  top: 0; left: 0;
  width: 44px; height: 44px;
  transform: rotate(-90deg);
}

.day-progress circle {
  fill: none;
  stroke-width: 3;
}

.day-progress .bg { stroke: var(--border); }
.day-progress .fg {
  stroke: var(--green);
  stroke-linecap: round;
  transition: stroke-dashoffset 0.5s;
}

/* ========== PRACTICE PAGE ========== */
.practice-header {
  text-align: center;
  margin-bottom: 24px;
}

.practice-day-title {
  font-size: 14px;
  color: var(--accent3);
  font-weight: 700;
  margin-bottom: 4px;
}

.practice-topic {
  font-size: 22px;
  font-weight: 900;
}

.section-toggle {
  display: flex;
  gap: 8px;
  margin-bottom: 20px;
  justify-content: center;
}

.section-btn {
  padding: 8px 20px;
  border-radius: 24px;
  border: 2px solid var(--border);
  background: transparent;
  color: var(--text-dim);
  font-family: inherit;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.3s;
}

.section-btn.active {
  border-color: var(--accent);
  background: rgba(247,183,51,0.1);
  color: var(--accent);
}

/* Sentence card */
.sentence-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 24px;
  margin-bottom: 16px;
  transition: all 0.3s;
}

.sentence-card.correct {
  border-color: rgba(0,230,118,0.4);
  background: rgba(0,230,118,0.05);
}

.sentence-card.wrong {
  border-color: rgba(255,82,82,0.4);
  background: rgba(255,82,82,0.05);
}

.sentence-number {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 28px; height: 28px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--accent3), var(--accent2));
  color: #fff;
  font-size: 13px;
  font-weight: 800;
  margin-bottom: 12px;
}

.sentence-en {
  font-size: 20px;
  font-weight: 700;
  line-height: 1.5;
  margin-bottom: 6px;
  color: #fff;
}

.sentence-cn {
  font-size: 14px;
  color: var(--text-dim);
  margin-bottom: 16px;
}

.sentence-actions {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  align-items: center;
}

.action-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  border-radius: 12px;
  border: 1px solid var(--border);
  background: var(--glass);
  color: var(--text);
  font-family: inherit;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s;
  white-space: nowrap;
}

.action-btn:hover {
  background: rgba(255,255,255,0.08);
  border-color: var(--accent3);
}

.action-btn.listen {
  border-color: rgba(106,130,251,0.4);
  color: var(--accent3);
}

.action-btn.record {
  border-color: rgba(252,92,125,0.4);
  color: var(--accent2);
}

.action-btn.record.recording {
  background: rgba(252,92,125,0.2);
  animation: recordPulse 1s infinite;
}

@keyframes recordPulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(252,92,125,0.4); }
  50% { box-shadow: 0 0 0 8px rgba(252,92,125,0); }
}

.action-btn.correct-mark { border-color: rgba(0,230,118,0.4); color: var(--green); }

/* Recognition result */
.recog-result {
  margin-top: 12px;
  padding: 12px 16px;
  border-radius: 12px;
  font-size: 14px;
  line-height: 1.6;
  display: none;
}

.recog-result.show { display: block; }

.recog-result.good {
  background: rgba(0,230,118,0.08);
  border: 1px solid rgba(0,230,118,0.2);
}

.recog-result.bad {
  background: rgba(255,82,82,0.08);
  border: 1px solid rgba(255,82,82,0.2);
}

.recog-text { color: var(--text); margin-bottom: 6px; }

.recog-score {
  font-weight: 800;
  font-size: 16px;
}

.word-correct { color: var(--green); }
.word-wrong { color: var(--red); text-decoration: underline; }

/* Progress bar */
.progress-bar-wrap {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 16px;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 14px;
}

.progress-bar-track {
  flex: 1;
  height: 8px;
  background: var(--border);
  border-radius: 4px;
  overflow: hidden;
}

.progress-bar-fill {
  height: 100%;
  border-radius: 4px;
  background: linear-gradient(90deg, var(--accent3), var(--green));
  transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
}

.progress-text {
  font-size: 14px;
  font-weight: 800;
  color: var(--accent);
  min-width: 50px;
  text-align: right;
}

/* Complete overlay */
.complete-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(15,15,26,0.95);
  backdrop-filter: blur(20px);
  z-index: 200;
  display: none;
  align-items: center;
  justify-content: center;
}

.complete-overlay.show { display: flex; }

.complete-content {
  text-align: center;
  padding: 40px;
  animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
}

@keyframes popIn {
  from { transform: scale(0.5); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

.complete-emoji { font-size: 80px; margin-bottom: 16px; }
.complete-title {
  font-size: 28px; font-weight: 900;
  background: linear-gradient(135deg, var(--accent), var(--green));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 8px;
}
.complete-sub { color: var(--text-dim); font-size: 16px; margin-bottom: 24px; }

.complete-stats {
  display: flex; gap: 24px; justify-content: center; margin-bottom: 32px;
}

.complete-stat-val { font-size: 32px; font-weight: 900; color: var(--green); }
.complete-stat-lbl { font-size: 12px; color: var(--text-dim); }

.btn-primary {
  padding: 14px 36px;
  border-radius: 16px;
  border: none;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: #fff;
  font-family: inherit;
  font-size: 16px;
  font-weight: 800;
  cursor: pointer;
  transition: all 0.3s;
  margin: 6px;
}

.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(247,183,51,0.3); }

.btn-secondary {
  padding: 14px 36px;
  border-radius: 16px;
  border: 2px solid var(--border);
  background: transparent;
  color: var(--text);
  font-family: inherit;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.3s;
  margin: 6px;
}

/* ========== WRONG PAGE ========== */
.wrong-empty {
  text-align: center;
  padding: 60px 20px;
}

.wrong-empty-icon { font-size: 64px; margin-bottom: 16px; }
.wrong-empty-text { color: var(--text-dim); font-size: 16px; }

/* ========== SPEED MODE ========== */
.speed-card {
  background: var(--card);
  border: 2px solid var(--accent);
  border-radius: 24px;
  padding: 32px 24px;
  text-align: center;
  margin-bottom: 20px;
  position: relative;
  overflow: hidden;
}

.speed-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 4px;
  background: linear-gradient(90deg, var(--accent), var(--accent2), var(--accent3));
}

.speed-timer {
  font-size: 64px;
  font-weight: 900;
  color: var(--accent);
  font-variant-numeric: tabular-nums;
}

.speed-sentence {
  font-size: 24px;
  font-weight: 700;
  color: #fff;
  margin: 16px 0 8px;
  line-height: 1.5;
}

.speed-cn {
  color: var(--text-dim);
  font-size: 15px;
  margin-bottom: 20px;
}

.speed-stats {
  display: flex;
  justify-content: center;
  gap: 32px;
  margin-top: 16px;
}

.speed-stat { text-align: center; }
.speed-stat-val { font-size: 24px; font-weight: 900; }
.speed-stat-lbl { font-size: 11px; color: var(--text-dim); text-transform: uppercase; }

/* ========== BACK BUTTON ========== */
.back-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  border-radius: 12px;
  border: 1px solid var(--border);
  background: var(--glass);
  color: var(--text-dim);
  font-family: inherit;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  margin-bottom: 20px;
  transition: all 0.2s;
}

.back-btn:hover { color: var(--text); border-color: var(--accent3); }

/* ========== TOOLTIP ========== */
.tooltip {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: var(--accent);
  color: #000;
  padding: 12px 24px;
  border-radius: 14px;
  font-weight: 700;
  font-size: 14px;
  z-index: 300;
  transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  pointer-events: none;
  white-space: nowrap;
}

.tooltip.show { transform: translateX(-50%) translateY(0); }

/* ========== EXP BAR ========== */
.exp-bar {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 12px 16px;
  margin-bottom: 24px;
  display: flex;
  align-items: center;
  gap: 12px;
}

.exp-level {
  font-size: 14px;
  font-weight: 800;
  color: var(--accent);
  min-width: 48px;
}

.exp-track {
  flex: 1;
  height: 10px;
  background: var(--border);
  border-radius: 5px;
  overflow: hidden;
}

.exp-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  border-radius: 5px;
  transition: width 0.5s;
}

.exp-text {
  font-size: 12px;
  color: var(--text-dim);
  font-weight: 600;
  min-width: 72px;
  text-align: right;
}

/* ========== CONFETTI ========== */
.confetti-container {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 999;
}

.confetti {
  position: absolute;
  width: 10px; height: 10px;
  border-radius: 2px;
  animation: confettiFall 3s ease-in forwards;
}

@keyframes confettiFall {
  0% { opacity: 1; transform: translateY(0) rotate(0deg); }
  100% { opacity: 0; transform: translateY(100vh) rotate(720deg); }
}

/* Responsive */
@media (max-width: 500px) {
  .stats-row { grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .stat-card { padding: 12px 8px; }
  .stat-value { font-size: 22px; }
  .sentence-en { font-size: 17px; }
  .sentence-actions { gap: 6px; }
  .action-btn { padding: 7px 12px; font-size: 12px; }
  .speed-sentence { font-size: 20px; }
  .speed-timer { font-size: 48px; }
  .nav-title { font-size: 14px; }
  .nav-tab { padding: 5px 10px; font-size: 12px; }
}

/* Hidden utility */
.hidden { display: none !important; }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* TTS speaking indicator */
.speaking { position: relative; }
.speaking::after {
  content: '🔊';
  position: absolute;
  top: -8px; right: -8px;
  font-size: 16px;
  animation: speakBounce 0.5s infinite alternate;
}

@keyframes speakBounce {
  from { transform: scale(1); }
  to { transform: scale(1.2); }
}

.phonetic-tip {
  font-size: 12px;
  color: var(--accent3);
  margin-top: 4px;
  font-style: italic;
}

/* Achievement badge */
.achievement-popup {
  position: fixed;
  top: 80px;
  right: 20px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: #fff;
  padding: 16px 24px;
  border-radius: 16px;
  font-weight: 700;
  font-size: 14px;
  z-index: 300;
  transform: translateX(300px);
  transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  box-shadow: 0 8px 32px rgba(247,183,51,0.4);
}

.achievement-popup.show { transform: translateX(0); }

.speed-mode-select {
  display: flex; flex-direction: column; gap: 12px;
  margin-top: 16px;
}

.speed-option {
  background: var(--card);
  border: 2px solid var(--border);
  border-radius: 16px;
  padding: 16px 20px;
  cursor: pointer;
  transition: all 0.3s;
  display: flex;
  align-items: center;
  gap: 12px;
}

.speed-option:hover {
  border-color: var(--accent);
  background: var(--card-hover);
}

.speed-option-icon { font-size: 28px; }
.speed-option-title { font-weight: 800; font-size: 16px; }
.speed-option-desc { font-size: 12px; color: var(--text-dim); }
</style>
</head>
<body>

<!-- Navigation -->
<div class="nav">
  <div class="nav-inner">
    <div class="nav-title">🌟 美音口语营</div>
    <div class="nav-tabs">
      <button class="nav-tab active" onclick="showPage('home')">首页</button>
      <button class="nav-tab" onclick="showPage('wrong')">错题本</button>
      <button class="nav-tab" onclick="showPage('speed')">挑战</button>
      <button class="nav-tab" onclick="showPage('favorites')">⭐收藏</button>
      <button class="nav-tab" onclick="showPage('settings')">⚙️</button>
    </div>
  </div>
</div>

<!-- Tooltip -->
<div class="tooltip" id="tooltip"></div>

<!-- Achievement popup -->
<div class="achievement-popup" id="achievement"></div>

<!-- Confetti container -->
<div class="confetti-container" id="confetti"></div>

<!-- Complete overlay -->
<div class="complete-overlay" id="completeOverlay">
  <div class="complete-content">
    <div class="complete-emoji">🎉</div>
    <div class="complete-title">太棒了！今日任务完成！</div>
    <div class="complete-sub" id="completeSub">你的表现非常出色</div>
    <div class="complete-stats">
      <div><div class="complete-stat-val" id="completeCorrect">0</div><div class="complete-stat-lbl">正确</div></div>
      <div><div class="complete-stat-val" id="completeTotal">0</div><div class="complete-stat-lbl">总数</div></div>
      <div><div class="complete-stat-val" id="completeAccuracy">0%</div><div class="complete-stat-lbl">正确率</div></div>
    </div>

const STORAGE_KEY = 'oral_practice_v3';

function loadState() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) return JSON.parse(saved);
  } catch(e) {}
  return {
    streak: 0,
    lastCheckIn: null,
    totalPracticed: 0,
    totalCorrect: 0,
    exp: 0,
    level: 1,
    dayProgress: {},   // { "1": { correct: [0,1,2], wrong: [3,4], completed: true } }
    wrongBook: [],      // [{ day, section, index, en, cn, attempts }]
    checkinDates: [],   // ["2024-01-01", ...]
    achievements: [],
    speedBest: 0,
    favorites: [],      // [{ day, index, en, cn, timestamp }]
    speechRate: 0.85    // TTS speed 0.6~1.2
  };
}

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  } catch(e) {}
}

if (!state.speechRate) state.speechRate = 0.85;

// ============================================================
// SPEECH RECOGNITION SETUP
// ============================================================
function setupRecognition() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    console.error('SpeechRecognition not supported');
    return null;
  }
  
  try {
    const rec = new SpeechRecognition();
    rec.lang = 'en-US';
    rec.continuous = false;
    rec.interimResults = false;
    rec.maxAlternatives = 3;
    
    // Add silence detection timeout (5 seconds)
    let silenceTimer = null;
    let hasReceivedSpeech = false;
    
    rec.onspeechstart = () => {
      hasReceivedSpeech = true;
      if (silenceTimer) clearTimeout(silenceTimer);
    };
    
    const startHandler = () => {
      hasReceivedSpeech = false;
      silenceTimer = setTimeout(() => {
        if (!hasReceivedSpeech) {
          try { rec.stop(); } catch(e) {}
          showTooltip('🎙️ 未检测到语音，请重试');
        }
      }, 5000);
    };
    
    rec.addEventListener('start', startHandler);
    
    const endHandler = () => {
      if (silenceTimer) clearTimeout(silenceTimer);
    };
    
    rec.addEventListener('end', endHandler);
    
    console.log('SpeechRecognition initialized successfully');
    return rec;
  } catch (e) {
    console.error('Failed to initialize SpeechRecognition:', e);
    return null;
  }
}

// ============================================================
// TTS - American English
// ============================================================
function speakUS(text, callback) {
  speechSynth.cancel();
  const utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = 'en-US';
  utterance.rate = state.speechRate || 0.85;
  utterance.pitch = 1.0;
  
  // Try to find US English voice
  const voices = speechSynth.getVoices();
  const usVoice = voices.find(v => v.lang === 'en-US' && v.name.includes('Samantha'))
    || voices.find(v => v.lang === 'en-US' && !v.name.includes('UK'))
    || voices.find(v => v.lang.startsWith('en-US'))
    || voices.find(v => v.lang.startsWith('en'));
  if (usVoice) utterance.voice = usVoice;
  
  if (callback) utterance.onend = callback;
  speechSynth.speak(utterance);
}

// Preload voices
if (speechSynth.onvoiceschanged !== undefined) {
  speechSynth.onvoiceschanged = () => {};
}
speechSynth.getVoices();

function getTodayStr() {
  return new Date().toISOString().split('T')[0];
}

function addExp(amount) {
  state.exp += amount;
  const needed = state.level * 100;
  if (state.exp >= needed) {
    state.exp -= needed;
    state.level++;
    showAchievement(`🎊 升级了! 等级 ${state.level}`);
    launchConfetti();
  }
  saveState();
}

function checkStreak() {
  const today = getTodayStr();
  if (state.lastCheckIn === today) return;
  
  const yesterday = new Date();
  yesterday.setDate(yesterday.getDate() - 1);
  const yStr = yesterday.toISOString().split('T')[0];
  
  if (state.lastCheckIn === yStr) {
    state.streak++;
  } else if (state.lastCheckIn !== today) {
    state.streak = 1;
  }
  
  state.lastCheckIn = today;
  if (!state.checkinDates.includes(today)) {
    state.checkinDates.push(today);
  }
  saveState();
}

// ============================================================
// WORD COMPARISON
// ============================================================
function compareWords(target, spoken) {
  const tWords = target.toLowerCase().replace(/[^a-z0-9\s']/g, '').split(/\s+/).filter(Boolean);
  const sWords = spoken.toLowerCase().replace(/[^a-z0-9\s']/g, '').split(/\s+/).filter(Boolean);
  
  let matchCount = 0;
  const results = [];
  
  for (let i = 0; i < tWords.length; i++) {
    const tw = tWords[i];
    let found = false;
    for (let j = 0; j < sWords.length; j++) {
      if (sWords[j] === tw || levenshtein(sWords[j], tw) <= 1) {
        found = true;
        break;
      }
    }
    results.push({ word: tw, correct: found });
    if (found) matchCount++;
  }
  
  const score = tWords.length > 0 ? Math.round((matchCount / tWords.length) * 100) : 0;
  return { score, results, spoken: sWords.join(' ') };
}

function levenshtein(a, b) {
  const m = a.length, n = b.length;
  const d = Array.from({length: m+1}, () => new Array(n+1).fill(0));
  for (let i = 0; i <= m; i++) d[i][0] = i;
  for (let j = 0; j <= n; j++) d[0][j] = j;
  for (let i = 1; i <= m; i++) {
    for (let j = 1; j <= n; j++) {
      d[i][j] = Math.min(
        d[i-1][j] + 1,
        d[i][j-1] + 1,
        d[i-1][j-1] + (a[i-1] === b[j-1] ? 0 : 1)
      );
    }
  }
  return d[m][n];
}

// ============================================================
// HOME PAGE
// ============================================================
function renderHome() {
  const today = getTodayStr();
  const isCheckedIn = state.checkinDates.includes(today);
  const expNeeded = state.level * 100;
  const expPct = Math.min(100, (state.exp / expNeeded) * 100);
  const accuracy = state.totalPracticed > 0 ? Math.round((state.totalCorrect / state.totalPracticed) * 100) : 0;
  
  // Calendar for last 35 days
  let calHTML = '';
  for (let i = 34; i >= 0; i--) {
    const d = new Date();
    d.setDate(d.getDate() - i);
    const ds = d.toISOString().split('T')[0];
    const done = state.checkinDates.includes(ds);
    const isToday = ds === today;
    const label = d.getDate();
    calHTML += `<div class="cal-day ${done?'done':''} ${isToday?'today':''}">${done?'✓':label}</div>`;
  }
  
  // Day cards
  let dayCards = '';
  for (const d of DAYS_DATA) {
    const prog = state.dayProgress[d.day] || { correct: [], wrong: [], completed: false };
    const total = 10;
    const done = (prog.correct || []).length;
    const pct = Math.round((done / total) * 100);
    const circumference = 2 * Math.PI * 18;
    const offset = circumference * (1 - pct / 100);
    
    dayCards += `
      <div class="day-card ${prog.completed ? 'completed' : ''}" onclick="openDay(${d.day})">
        <div class="day-info">
          <div class="day-num">Day ${d.day}</div>
          <div class="day-topic">${d.topic} ${prog.completed ? '✅' : ''}</div>
        </div>
        <div class="day-progress">
          <svg viewBox="0 0 44 44">
            <circle class="bg" cx="22" cy="22" r="18"/>
            <circle class="fg" cx="22" cy="22" r="18" 
              stroke-dasharray="${circumference}" 
              stroke-dashoffset="${offset}"/>
          </svg>
          <span>${pct}%</span>
        </div>
      </div>`;
  }
  
  return `
    <div class="streak-banner">
      <div class="streak-fire">🔥</div>
      <div class="streak-count">${state.streak} 天</div>
      <div class="streak-label">连续打卡 · ${isCheckedIn ? '今日已打卡 ✅' : '今日未打卡'}</div>
    </div>
    
    <div class="exp-bar">
      <div class="exp-level">Lv.${state.level}</div>
      <div class="exp-track"><div class="exp-fill" style="width:${expPct}%"></div></div>
      <div class="exp-text">${state.exp} / ${expNeeded} XP</div>
    </div>
    
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-value">${state.totalPracticed}</div>
        <div class="stat-label">已练习</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" style="color:var(--green)">${accuracy}%</div>
        <div class="stat-label">正确率</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" style="color:var(--accent2)">${state.wrongBook.length}</div>
        <div class="stat-label">错题</div>
      </div>
    </div>
    
    <div class="calendar-title">📅 打卡日历（近35天）</div>
    <div class="calendar-grid">${calHTML}</div>
    
    <div class="calendar-title">📚 课程列表</div>
    <div class="day-list">${dayCards}</div>
  `;
}

  const dayData = DAYS_DATA.find(d => d.day === currentDay);
  if (!dayData) return '';
  
  const sentences = currentSection === 'basic' ? dayData.basic : dayData.advanced;
  const prog = state.dayProgress[currentDay] || { correct: [], wrong: [], completed: false };
  const offset = currentSection === 'advanced' ? 5 : 0;
  
  const totalDone = (prog.correct || []).length;
  const pct = Math.round((totalDone / 10) * 100);
  
  let cards = '';
  sentences.forEach((s, i) => {
    const globalIdx = offset + i;
    const isCorrect = (prog.correct || []).includes(globalIdx);
    const isWrong = (prog.wrong || []).includes(globalIdx);
    const statusClass = isCorrect ? 'correct' : isWrong ? 'wrong' : '';
    const isFavorited = (state.favorites || []).some(f => f.day === currentDay && f.index === globalIdx);
    
    cards += `
      <div class="sentence-card ${statusClass}" id="card-${globalIdx}">
        <div class="sentence-number">${i + 1}</div>
        <div class="sentence-en" id="sen-en-${globalIdx}">${s.en}</div>
        <div class="sentence-cn">${s.cn}</div>
        <div class="sentence-actions">
          <button class="action-btn listen" onclick="listenSentence('${escapeJS(s.en)}', this)" title="听美音朗读">
            🔊 听读音
          </button>
          <button class="action-btn listen" onclick="listenSlow('${escapeJS(s.en)}', this)" title="慢速播放">
            🐢 慢速
          </button>
          <button class="action-btn record" id="rec-${globalIdx}" 
            onclick="toggleRecord(${globalIdx}, '${escapeJS(s.en)}', '${escapeJS(s.cn)}')" title="录音跟读">
            🎤 跟读
          </button>
          <button class="action-btn" onclick="toggleFavorite(${currentDay}, ${globalIdx}, '${escapeJS(s.en)}', '${escapeJS(s.cn)}')" title="${isFavorited ? '取消收藏' : '收藏'}">
            ${isFavorited ? '⭐' : '☆'} 收藏
          </button>
          ${isCorrect ? '<span class="action-btn correct-mark">✅ 已掌握</span>' : ''}
          ${i < sentences.length - 1 ? `<button class="action-btn" onclick="scrollToNext(${globalIdx + 1})" title="跳到下一句">下一句 ➜</button>` : ''}
        </div>
        <div class="recog-result" id="result-${globalIdx}"></div>
      </div>`;
  });
  
  return `
    <button class="back-btn" onclick="closeDay()">← 返回课程列表</button>
    
    <div class="practice-header">
      <div class="practice-day-title">DAY ${currentDay}</div>
      <div class="practice-topic">${dayData.topic}</div>
    </div>
    
    <div class="progress-bar-wrap">
      <div style="font-size:13px;color:var(--text-dim)">完成度</div>
      <div class="progress-bar-track">
        <div class="progress-bar-fill" style="width:${pct}%"></div>
      </div>
      <div class="progress-text">${totalDone}/10</div>
    </div>
    
    <div class="progress-bar-wrap" style="margin-bottom:16px;">
      <div style="font-size:13px;color:var(--text-dim);margin-bottom:8px;">
        🔊 语速调节: <span id="speed-value">${(state.speechRate || 0.85).toFixed(2)}x</span>
      </div>
      <input type="range" min="0.6" max="1.2" step="0.05" value="${state.speechRate || 0.85}" 
        oninput="updateSpeechRate(this.value)" 
        style="width:100%;height:6px;border-radius:3px;background:var(--border);outline:none;appearance:none;cursor:pointer;">
    </div>
    
    <div class="section-toggle">
      <button class="section-btn ${currentSection==='basic'?'active':''}" onclick="setSection('basic')">⭐ 基础5句</button>
      <button class="section-btn ${currentSection==='advanced'?'active':''}" onclick="setSection('advanced')">🚀 提升5句</button>
    </div>
    
    ${cards}
  `;
}

function escapeJS(str) {
  return str.replace(/'/g, "\\'").replace(/"/g, '\\"');
}

// LISTEN
// ============================================================
function listenSentence(text, btn) {
  btn.classList.add('speaking');
  speakUS(text, () => btn.classList.remove('speaking'));
}

function listenSlow(text, btn) {
  speechSynth.cancel();
  const utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = 'en-US';
  utterance.rate = 0.55;
  utterance.pitch = 1.0;
  const voices = speechSynth.getVoices();
  const usVoice = voices.find(v => v.lang === 'en-US') || voices.find(v => v.lang.startsWith('en'));
  if (usVoice) utterance.voice = usVoice;
  btn.classList.add('speaking');
  utterance.onend = () => btn.classList.remove('speaking');
  speechSynth.speak(utterance);
}

async function toggleRecord(idx, targetEn, targetCn) {
  if (!recognition) {
    recognition = setupRecognition();
  }
  
  if (!recognition) {
    showTooltip('⚠️ 你的浏览器不支持语音识别\n\n推荐使用：\n📱 手机：Safari (iOS) 或 Chrome (Android)\n💻 电脑：Chrome 或 Edge');
    return;
  }
  
  const btn = document.getElementById(`rec-${idx}`);
  
  if (isRecording && currentRecordingIdx === idx) {
    // Stop
    recognition.stop();
    isRecording = false;
    btn.classList.remove('recording');
    btn.innerHTML = '🎤 跟读';
    return;
  }
  
  // Stop any previous
  if (isRecording) {
    recognition.stop();
    const prevBtn = document.getElementById(`rec-${currentRecordingIdx}`);
    if (prevBtn) {
      prevBtn.classList.remove('recording');
      prevBtn.innerHTML = '🎤 跟读';
    }
  }
  
  currentRecordingIdx = idx;
  isRecording = true;
  btn.classList.add('recording');
  btn.innerHTML = '⏹ 录音中...';
  
  // Track if recognition actually started
  let recognitionStarted = false;
  
  recognition.onstart = () => {
    recognitionStarted = true;
    console.log('Recognition started (onstart event)');
  };
  
  recognition.onresult = (event) => {
    const spoken = event.results[0][0].transcript;
    processResult(idx, targetEn, targetCn, spoken);
  };
  
  recognition.onerror = (event) => {
    isRecording = false;
    btn.classList.remove('recording');
    btn.innerHTML = '🎤 跟读';
    
    console.log('Recognition error:', event.error);
    
    if (event.error === 'no-speech') {
      showTooltip('🎙️ 没有检测到语音，请再试一次');
    } else if (event.error === 'not-allowed' || event.error === 'permission-denied') {
      showTooltip('❌ 需要麦克风权限\n\n请在浏览器设置中允许使用麦克风\n\n📱 iOS: 设置→Safari→网站→麦克风\n📱 Android: 设置→网站设置→麦克风');
    } else if (event.error === 'aborted') {
      showTooltip('⏹️ 录音已取消');
    } else if (event.error === 'network') {
      showTooltip('⚠️ 网络错误，请检查网络连接');
    } else {
      showTooltip('⚠️ 录音出错: ' + event.error + '\n\n请刷新页面重试');
    }
  };
  
  recognition.onend = () => {
    isRecording = false;
    btn.classList.remove('recording');
    btn.innerHTML = '🎤 跟读';
    
    // If recognition ended without getting any results, it might be a permission issue
    console.log('Recognition ended');
  };
  
  try {
    console.log('Attempting to start recognition...');
    recognition.start();
    
    // Set a timeout to check if recognition actually started (important for mobile)
    setTimeout(() => {
      if (recognitionStarted) {
        // Recognition started successfully
        console.log('Recognition confirmed started');
      } else if (isRecording) {
        // Recognition didn't start but we're still in "recording" state
        console.warn('Recognition failed to start - resetting state');
        isRecording = false;
        btn.classList.remove('recording');
        btn.innerHTML = '🎤 跟读';
        showTooltip('⚠️ 录音未能启动\n\n可能原因：\n1. 权限弹窗打断了录音\n2. 请再次点击"🎤 跟读"重试\n3. 如果仍然失败，请刷新页面');
      }
    }, 1000); // Wait 1 second for onstart event
    
  } catch(e) {
    isRecording = false;
    btn.classList.remove('recording');
    btn.innerHTML = '🎤 跟读';
    console.error('Failed to start recognition:', e);
    showTooltip('⚠️ 启动录音失败\n\n' + e.message + '\n\n请再次点击尝试');
  }
}

function processResult(idx, targetEn, targetCn, spoken) {
  const comparison = compareWords(targetEn, spoken);
  const resultEl = document.getElementById(`result-${idx}`);
  const card = document.getElementById(`card-${idx}`);
  
  // Build word-by-word display with click-to-listen for wrong words
  let wordHTML = comparison.results.map(r => {
    if (r.correct) {
      return `<span class="word-correct">${r.word}</span>`;
    } else {
      return `<span class="word-wrong" onclick="speakWord('${escapeJS(r.word)}')" style="cursor:pointer;position:relative;" title="点击听正确发音">${r.word}<span style="font-size:10px;margin-left:2px;">🔊</span></span>`;
    }
  }).join(' ');
  
  const isGood = comparison.score >= 70;
  
  // Count wrong words for feedback
  const wrongWords = comparison.results.filter(r => !r.correct);
  const wrongWordsList = wrongWords.length > 0 
    ? `<div style="margin-top:8px;padding:8px;background:rgba(255,82,82,0.1);border-radius:8px;font-size:13px;">
         <strong>❌ 需要注意的词：</strong><br>
         ${wrongWords.map(w => `<span class="word-wrong" onclick="speakWord('${escapeJS(w.word)}')" style="cursor:pointer;padding:2px 6px;margin:2px;display:inline-block;">${w.word} 🔊</span>`).join(' ')}
         <div style="font-size:11px;color:var(--text-dim);margin-top:4px;">💡 点击单词可单独听发音</div>
       </div>` 
    : '';
  
  resultEl.className = `recog-result show ${isGood ? 'good' : 'bad'}`;
  resultEl.innerHTML = `
    <div class="recog-text">
      <strong>你说的：</strong>${spoken}<br>
      <strong>对比：</strong>${wordHTML}
    </div>
    <div class="recog-score ${isGood ? 'word-correct' : 'word-wrong'}">
      ${isGood ? '🎉' : '💪'} 匹配度: ${comparison.score}%
      ${isGood ? ' - 太棒了!' : ' - 再练练!'}
    </div>
    ${wrongWordsList}
  `;
  
  // Auto scroll to next if score >= 80%
  if (comparison.score >= 80) {
    setTimeout(() => {
      const nextIdx = idx + 1;
      const nextCard = document.getElementById(`card-${nextIdx}`);
      if (nextCard) {
        nextCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }
    }, 1500);
  }
  
  // Update state
  if (!state.dayProgress[currentDay]) {
    state.dayProgress[currentDay] = { correct: [], wrong: [], completed: false };
  }
  const prog = state.dayProgress[currentDay];
  
  state.totalPracticed++;
  
  if (isGood) {
    if (!prog.correct.includes(idx)) {
      prog.correct.push(idx);
      state.totalCorrect++;
      addExp(10);
    }
    // Remove from wrong if was there
    prog.wrong = prog.wrong.filter(w => w !== idx);
    card.className = 'sentence-card correct';
    
    // Remove from wrong book
    state.wrongBook = state.wrongBook.filter(w => 
      !(w.day === currentDay && w.index === idx)
    );
    
    // Check day completion
    if (prog.correct.length >= 10 && !prog.completed) {
      prog.completed = true;
      checkStreak();
      addExp(50);
      setTimeout(() => showComplete(prog), 500);
    }
  } else {
    if (!prog.wrong.includes(idx)) {
      prog.wrong.push(idx);
    }
    card.className = 'sentence-card wrong';
    
    // Add to wrong book
    const existing = state.wrongBook.find(w => w.day === currentDay && w.index === idx);
    if (existing) {
      existing.attempts = (existing.attempts || 0) + 1;
    } else {
      state.wrongBook.push({
        day: currentDay,
        section: idx >= 5 ? 'advanced' : 'basic',
        index: idx,
        en: targetEn,
        cn: targetCn,
        attempts: 1
      });
    }
  }
  
  saveState();
}

function showComplete(prog) {
  const correct = prog.correct.length;
  const total = 10;
  const accuracy = Math.round((correct / total) * 100);
  
  document.getElementById('completeCorrect').textContent = correct;
  document.getElementById('completeTotal').textContent = total;
  document.getElementById('completeAccuracy').textContent = accuracy + '%';
  
  const msgs = [
    '你是语言天才！',
    '坚持就是胜利！',
    '口语越来越棒了！',
    '美音发音太标准了！',
    '继续保持这个势头！'
  ];
  document.getElementById('completeSub').textContent = msgs[Math.floor(Math.random() * msgs.length)];
  
  document.getElementById('completeOverlay').classList.add('show');
  launchConfetti();
}

function closeComplete() {
  document.getElementById('completeOverlay').classList.remove('show');
  closeDay();
}

function reviewWrong() {
  document.getElementById('completeOverlay').classList.remove('show');
  currentDay = null;
  showPage('wrong');
}

async function wrongRecord(wrongIdx) {
  if (!recognition) recognition = setupRecognition();
  if (!recognition) {
    showTooltip('⚠️ 浏览器不支持语音识别\n\n推荐使用：\n📱 手机：Safari (iOS) 或 Chrome (Android)\n💻 电脑：Chrome 或 Edge');
    return;
  }
  
  const w = state.wrongBook[wrongIdx];
  if (!w) return;
  
  const btn = document.getElementById(`wrong-rec-${wrongIdx}`);
  
  if (isRecording) {
    recognition.stop();
    isRecording = false;
    btn.classList.remove('recording');
    btn.innerHTML = '🎤 跟读';
    return;
  }
  
  isRecording = true;
  btn.classList.add('recording');
  btn.innerHTML = '⏹ 录音中...';
  
  recognition.onresult = (event) => {
    const spoken = event.results[0][0].transcript;
    const comparison = compareWords(w.en, spoken);
    const resultEl = document.getElementById(`wrong-result-${wrongIdx}`);
    
    let wordHTML = comparison.results.map(r => 
      `<span class="${r.correct ? 'word-correct' : 'word-wrong'}">${r.word}</span>`
    ).join(' ');
    
    const isGood = comparison.score >= 70;
    resultEl.className = `recog-result show ${isGood ? 'good' : 'bad'}`;
    resultEl.innerHTML = `
      <div class="recog-text"><strong>你说的：</strong>${spoken}<br><strong>对比：</strong>${wordHTML}</div>
      <div class="recog-score ${isGood ? 'word-correct' : 'word-wrong'}">
        ${isGood ? '🎉' : '💪'} 匹配度: ${comparison.score}% ${isGood ? '- 太棒了!' : '- 再练练!'}
      </div>`;
    
    if (isGood) {
      addExp(15);
      showTooltip('🌟 错题攻克成功! +15XP');
      // Remove from wrong book after delay
      setTimeout(() => {
        state.wrongBook.splice(wrongIdx, 1);
        saveState();
        render();
      }, 2000);
    }
  };
  
  recognition.onerror = () => {
    isRecording = false;
    btn.classList.remove('recording');
    btn.innerHTML = '🎤 跟读';
  };
  
  recognition.onend = () => {
    isRecording = false;
    btn.classList.remove('recording');
    btn.innerHTML = '🎤 跟读';
  };
  
  try { recognition.start(); } catch(e) {
    isRecording = false;
    btn.classList.remove('recording');
    btn.innerHTML = '🎤 跟读';
  }
}

function removeWrong(idx) {
  state.wrongBook.splice(idx, 1);
  addExp(5);
  saveState();
  showTooltip('✅ 已标记为掌握');
  render();
}

function clearAllWrong() {
  if (confirm('确定清空所有错题吗？')) {
    state.wrongBook = [];
    saveState();
    render();
    showTooltip('🗑 错题本已清空');
  }
}

let speedTime = 0;

function renderSpeed() {

    </div>`;
}

function startSpeed(mode) {
  speedSentences = [];
  speedIdx = 0;
  speedCorrect = 0;
  speedTime = 0;
  speedActive = true;
  
  if (mode === 'wrong') {
    if (state.wrongBook.length === 0) {
      showTooltip('📖 错题本为空，先去练习吧');
      return;
    }
    speedSentences = state.wrongBook.map(w => ({ en: w.en, cn: w.cn }));
  } else if (mode === 'basic') {
    DAYS_DATA.forEach(d => d.basic.forEach(s => speedSentences.push(s)));
  } else {
    DAYS_DATA.forEach(d => {
      d.basic.forEach(s => speedSentences.push(s));
      d.advanced.forEach(s => speedSentences.push(s));
    });
  }
  
  // Shuffle
  for (let i = speedSentences.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [speedSentences[i], speedSentences[j]] = [speedSentences[j], speedSentences[i]];
  }
  
  // Limit to 20
  speedSentences = speedSentences.slice(0, 20);
  
  speedTimer = setInterval(() => {
    speedTime++;
    const el = document.getElementById('speedTimerDisplay');
    if (el) el.textContent = speedTime + 's';
  }, 1000);
  
  render();
}

function stopSpeed() {
  speedIdx = speedSentences.length;
  render();
}

function speedSkip() {
  speedIdx++;
  render();
}

async function speedRecord() {
  if (!recognition) recognition = setupRecognition();
  if (!recognition) {
    showTooltip('⚠️ 浏览器不支持语音识别\n\n推荐使用：\n📱 手机：Safari (iOS) 或 Chrome (Android)\n💻 电脑：Chrome 或 Edge');
    return;
  }
  
  const btn = document.getElementById('speed-rec');
  if (isRecording) {
    recognition.stop();
    return;
  }
  
  isRecording = true;
  btn.classList.add('recording');
  btn.innerHTML = '⏹ 录音中...';
  
  const s = speedSentences[speedIdx];
  
  recognition.onresult = (event) => {
    const spoken = event.results[0][0].transcript;
    const comparison = compareWords(s.en, spoken);
    const resultEl = document.getElementById('speed-result');
    const isGood = comparison.score >= 70;
    
    let wordHTML = comparison.results.map(r => 
      `<span class="${r.correct ? 'word-correct' : 'word-wrong'}">${r.word}</span>`
    ).join(' ');
    
    resultEl.className = `recog-result show ${isGood ? 'good' : 'bad'}`;
    resultEl.innerHTML = `
      <div class="recog-text"><strong>你说的：</strong>${spoken}<br><strong>对比：</strong>${wordHTML}</div>
      <div class="recog-score ${isGood ? 'word-correct' : 'word-wrong'}">
        ${isGood ? '🎉' : '💪'} 匹配度: ${comparison.score}%
      </div>`;
    
    if (isGood) speedCorrect++;
    
    setTimeout(() => {
      speedIdx++;
      render();
    }, 1500);
  };
  
  recognition.onerror = () => {
    isRecording = false;
    btn.classList.remove('recording');
    btn.innerHTML = '🎤 开始跟读';
    showTooltip('🎙️ 没有检测到语音');
  };
  
  recognition.onend = () => {
    isRecording = false;
    if (btn) {
      btn.classList.remove('recording');
      btn.innerHTML = '🎤 开始跟读';
    }
  };
  
  try { recognition.start(); } catch(e) {
    isRecording = false;
    btn.classList.remove('recording');
    btn.innerHTML = '🎤 开始跟读';
  }
}

// Speech rate control
function updateSpeechRate(rate) {
  state.speechRate = parseFloat(rate);
  const el = document.getElementById('speed-value');
  if (el) el.textContent = rate + 'x';
  saveState();
}

// Favorite management
function toggleFavorite(day, index, en, cn) {
  if (!state.favorites) state.favorites = [];
  const existingIdx = state.favorites.findIndex(f => f.day === day && f.index === index);
  if (existingIdx >= 0) {
    state.favorites.splice(existingIdx, 1);
    showTooltip('已取消收藏');
  } else {
    state.favorites.push({ day, index, en, cn, timestamp: Date.now() });
    showTooltip('⭐ 已收藏到金句本');
  }
  saveState();
  render();
}

// Scroll to next sentence
function scrollToNext(nextIdx) {
  const nextCard = document.getElementById(`card-${nextIdx}`);
  if (nextCard) {
    nextCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
    setTimeout(() => {
      const recBtn = document.getElementById(`rec-${nextIdx}`);
      if (recBtn) {
        recBtn.style.animation = 'recordPulse 0.5s 2';
        setTimeout(() => recBtn.style.animation = '', 1000);
      }
    }, 500);
  }
}

// Speak individual word
function speakWord(word) {
  speechSynth.cancel();
  const utterance = new SpeechSynthesisUtterance(word);
  utterance.lang = 'en-US';
  utterance.rate = 0.8;
  utterance.pitch = 1.0;
  const voices = speechSynth.getVoices();
  const usVoice = voices.find(v => v.lang === 'en-US') || voices.find(v => v.lang.startsWith('en'));
  if (usVoice) utterance.voice = usVoice;
  speechSynth.speak(utterance);
}

// Render favorites page
function renderFavorites() {
  if (!state.favorites) state.favorites = [];
  if (state.favorites.length === 0) {
    return `
      <div style="text-align:center;padding:80px 20px;color:var(--text-dim);">
        <div style="font-size:64px;margin-bottom:16px;">⭐</div>
        <div style="font-size:18px;font-weight:700;margin-bottom:8px;">收藏本是空的</div>
        <div style="font-size:14px;">遇到喜欢的句子，点击"收藏"按钮添加到这里</div>
      </div>
    `;
  }

  let cards = '';
  state.favorites.slice().reverse().forEach((fav, i) => {
    const realIdx = state.favorites.length - 1 - i;
    cards += `
      <div class="sentence-card" style="margin-bottom:12px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
          <div class="sentence-number" style="display:inline-flex;">Day ${fav.day}</div>
          <button class="action-btn" onclick="removeFavorite(${realIdx})" style="padding:4px 12px;font-size:12px;">

        <div class="sentence-cn">${fav.cn}</div>
        <div class="sentence-actions">
          <button class="action-btn listen" onclick="listenSentence('${escapeJS(fav.en)}', this)">
            🔊 听读音
          </button>
          <button class="action-btn listen" onclick="listenSlow('${escapeJS(fav.en)}', this)">
            🐢 慢速
          </button>
        </div>
      </div>
    `;
  });

  return `
    <div style="text-align:center;margin-bottom:24px;">
      <div style="font-size:22px;font-weight:900;margin-bottom:4px;">⭐ 我的收藏</div>
      <div style="font-size:13px;color:var(--text-dim);">共 ${state.favorites.length} 个金句</div>
    </div>
    ${cards}
  `;
}

function removeFavorite(index) {
  if (!state.favorites) state.favorites = [];
  state.favorites.splice(index, 1);
  saveState();
  render();
  showTooltip('已移除');
}

function updateSpeechRateSettings(rate) {
  state.speechRate = parseFloat(rate);
  saveState();
  const displays = document.querySelectorAll('[style*="当前语速"]');
  displays.forEach(el => {
    const span = el.querySelector('span');
    if (span) span.textContent = rate + 'x';
  });
}

function testSpeechRate() {
  speakUS("Hello! This is a test of the current speech rate. How does it sound?");
  showTooltip('🎵 播放测试语音中...');
}

function confirmReset() {
  if (confirm('⚠️ 确定要重置所有数据吗？\n\n这将清空：\n- 所有学习进度\n- 打卡记录\n- 错题本\n- 收藏本\n- 连续打卡天数\n- 等级和经验\n\n此操作不可恢复！')) {
    if (confirm('⚠️ 最后确认：真的要删除所有数据吗？')) {
      localStorage.removeItem(STORAGE_KEY);
      location.reload();
    }
  }
}
